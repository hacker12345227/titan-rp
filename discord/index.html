<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord - Titan Roleplay</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-text">TITAN</div>
</div>

<div class="cursor-glow"></div>

<header class="header">
  <h1>TITAN</h1>
  <nav>
    <a href="../">Home</a>
    <a href="../over-ons/">Over Ons</a>
    <a href="../regels/">Regels</a>
    <a href="../staff/">Staff</a>
    <a href="../discord/">Discord</a>
    <a href="#join">Join</a>
  </nav>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h2 class="fade-up">Join onze Discord</h2>
    <p class="fade-up">Blijf op de hoogte van updates en events.</p>

    <a href="https://discord.gg/YOUR_INVITE" target="_blank" class="btn fade-up">
      Join Discord
    </a>
  </div>
</section>

<section class="features">
  <h2 class="section-title fade-up">Discord Community</h2>

  <div class="cards">
    <div class="card fade-up">
      <h3>Updates</h3>
      <p>Altijd de nieuwste server info.</p>
    </div>

    <div class="card fade-up">
      <h3>Support</h3>
      <p>Snelle hulp van staff.</p>
    </div>

    <div class="card fade-up">
      <h3>Community</h3>
      <p>Praat met andere spelers.</p>
    </div>
  </div>
</section>

<section class="join fade-up">
  <h2>Discord Widget</h2>

  <iframe 
    src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"
    width="350"
    height="500"
    allowtransparency="true"
    frameborder="0">
  </iframe>

</section>

<script src="../js/script.js"></script>
</body>
</html>
