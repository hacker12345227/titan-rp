<!DOCTYPE html>
<html lang="nl">
<head>

<title>Titan Roleplay | Premium FiveM Roleplay Server</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="keywords" content="Titan Roleplay, FiveM roleplay, GTA RP Nederland, FiveM server Nederland, roleplay server, GTA RP server, politie roleplay, ambulance roleplay, crimineel roleplay, Dutch RP, FiveM NL">

<meta name="robots" content="index, follow">

<link rel="stylesheet" href="css/style.css">

<link rel="icon" type="image/png" href="/assets/Ontwerp_zonder_titel_2.png">

<!-- Open Graph -->
<meta property="og:title" content="Titan Roleplay">
<meta property="og:description" content="Join Titan Roleplay – een premium FiveM roleplay server met realistische gameplay en een sterke community.">
<meta property="og:image" content="/assets/og-image.png">
<meta property="og:url" content="https://titanroleplay.nl/">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Titan Roleplay">
<meta name="twitter:description" content="Premium FiveM Roleplay Server met realistische gameplay en luxe systemen.">
<meta name="twitter:image" content="/assets/og-image.png">

<!-- Google Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Titan Roleplay",
  "url": "titanroleplay.nl",
  "logo": "/assets/Ontwerp_zonder_titel_2.png",
  "sameAs": [
    "https://discord.gg/YOUR_INVITE"
  ]
}
</script>

</head>
<body>

<!-- LOADER -->

<div class="loader" id="loader">
  <div class="loader-text">TITAN</div>
</div>

<!-- CURSOR GLOW -->

<div class="cursor-glow"></div>

<!-- HEADER -->

<header class="header">
  <h1>TITAN</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/over-ons/">Over Ons</a>
    <a href="/regels/">Regels</a>
    <a href="/staff/">Staff</a>
    <a href="/discord/">Discord</a>
    <a href="#join">Join</a>
  </nav>
</header>

<!-- HERO -->

<section class="hero">

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="assets/video.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="hero-content">
    <h2 class="fade-up">Titan Roleplay</h2>
    <p class="fade-up">Elite FiveM Experience</p>

    <button class="btn fade-up" onclick="joinServer()">
      Join Server
    </button>
  </div>

</section>

<!-- FEATURES -->

<section id="features" class="features">
  <h2 class="section-title fade-up">Exclusieve Features</h2>

  <div class="cards">
    <div class="card fade-up">
      <h3>High-End RP</h3>
      <p>Alleen serieuze spelers.</p>
    </div>


<div class="card fade-up">
  <h3>Custom Systems</h3>
  <p>Unieke mechanics en scripts.</p>
</div>

<div class="card fade-up">
  <h3>Elite Community</h3>
  <p>Geen chaos, alleen kwaliteit.</p>
</div>


  </div>
</section>

<!-- STATS -->

<section class="stats">
  <div class="stat">
    <h3 id="players">0</h3>
    <p>Spelers Online</p>
  </div>
  <div class="stat">
    <h3>99%</h3>
    <p>Uptime</p>
  </div>
</section>

<!-- JOIN -->

<section id="join" class="join fade-up">
  <h2>Start jouw verhaal</h2>
  <button onclick="joinServer()" class="btn">Connect</button>
</section>

<!-- JS -->

<script src="js/script.js"></script>
